# Tests: do not require Google OAuth2 or a live DB; disable strict security
app.jwt.secret=testtesttesttesttesttesttesttest12
app.jwt.expiration-ms=86400000
app.frontend.url=http://localhost:5173
app.backend.base-url=http://localhost:8080
app.security.permit-all=true
GOOGLE_CLIENT_ID=test-google-client
GOOGLE_CLIENT_SECRET=test-secret
spring.datasource.url=jdbc:h2:mem:camopstest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false
